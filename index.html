<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>箭頭素材產生器</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Microsoft JhengHei", sans-serif;
    background: #1a1a2e;
    color: #eee;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 20px;
  }
  h1 { margin-bottom: 24px; font-size: 24px; }

  .container {
    display: flex;
    gap: 32px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 900px;
    width: 100%;
  }

  /* 預覽區 */
  .preview {
    flex: 1;
    min-width: 300px;
    background: #16213e;
    border-radius: 16px;
    padding: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  .preview-bg {
    width: 100%;
    aspect-ratio: 1;
    max-width: 400px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    /* 透明格子背景 */
    background-image:
      linear-gradient(45deg, #ccc 25%, transparent 25%),
      linear-gradient(-45deg, #ccc 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #ccc 75%),
      linear-gradient(-45deg, transparent 75%, #ccc 75%);
    background-size: 20px 20px;
    background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
    background-color: #fff;
  }
  .preview-bg svg {
    transition: all 0.3s ease;
  }

  /* 控制面板 */
  .controls {
    flex: 1;
    min-width: 280px;
    background: #16213e;
    border-radius: 16px;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .control-group { display: flex; flex-direction: column; gap: 6px; }
  .control-group label {
    font-size: 14px;
    font-weight: 600;
    color: #a0a0c0;
  }
  .control-group input[type="range"] {
    width: 100%;
    accent-color: #e94560;
  }
  .control-group input[type="color"] {
    width: 60px;
    height: 36px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: none;
  }
  .value-display {
    font-size: 13px;
    color: #777;
    min-width: 50px;
    text-align: right;
  }
  .row {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  /* 箭頭樣式選擇 */
  .style-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .style-btn {
    background: #0f3460;
    border: 2px solid transparent;
    border-radius: 10px;
    padding: 10px 6px;
    color: #eee;
    cursor: pointer;
    font-size: 13px;
    text-align: center;
    transition: all 0.2s;
  }
  .style-btn:hover { background: #1a4a7a; }
  .style-btn.active { border-color: #e94560; background: #1a4a7a; }

  /* 方向按鈕 */
  .dir-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  .dir-btn {
    background: #0f3460;
    border: 2px solid transparent;
    border-radius: 10px;
    padding: 10px;
    color: #eee;
    cursor: pointer;
    font-size: 20px;
    text-align: center;
    transition: all 0.2s;
  }
  .dir-btn:hover { background: #1a4a7a; }
  .dir-btn.active { border-color: #e94560; }

  /* 快速顏色 */
  .color-presets {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .color-swatch {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    border: 2px solid transparent;
    cursor: pointer;
    transition: all 0.2s;
  }
  .color-swatch:hover { transform: scale(1.15); }
  .color-swatch.active { border-color: #fff; }

  /* 下載按鈕 */
  .download-row {
    display: flex;
    gap: 8px;
    margin-top: 8px;
  }
  .btn {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-primary { background: #e94560; color: #fff; }
  .btn-primary:hover { background: #ff6b81; }
  .btn-secondary { background: #0f3460; color: #eee; }
  .btn-secondary:hover { background: #1a4a7a; }
</style>
</head>
<body>

<h1>🏹 箭頭素材產生器</h1>

<div class="container">
  <!-- 預覽 -->
  <div class="preview">
    <div class="preview-bg" id="previewBg">
      <svg id="arrowSvg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="150" height="150">
        <g id="arrowGroup" transform="rotate(0 100 100)">
          <polygon id="arrowShape" points="" fill="#FF4444" stroke="none" stroke-width="0" stroke-linejoin="round"/>
        </g>
      </svg>
    </div>
    <div class="download-row">
      <button class="btn btn-primary" onclick="downloadSVG()">下載 SVG</button>
      <button class="btn btn-secondary" onclick="downloadPNG()">下載 PNG</button>
    </div>
  </div>

  <!-- 控制面板 -->
  <div class="controls">

    <!-- 箭頭樣式 -->
    <div class="control-group">
      <label>箭頭樣式</label>
      <div class="style-grid">
        <button class="style-btn active" data-style="solid" onclick="setStyle(this)">實心箭頭</button>
        <button class="style-btn" data-style="thin" onclick="setStyle(this)">細長箭頭</button>
        <button class="style-btn" data-style="fat" onclick="setStyle(this)">寬胖箭頭</button>
        <button class="style-btn" data-style="chevron" onclick="setStyle(this)">V 形箭頭</button>
        <button class="style-btn" data-style="curved" onclick="setStyle(this)">弧形箭頭</button>
        <button class="style-btn" data-style="triangle" onclick="setStyle(this)">三角箭頭</button>
      </div>
    </div>

    <!-- 方向 -->
    <div class="control-group">
      <label>方向</label>
      <div class="dir-grid">
        <button class="dir-btn" data-deg="270" onclick="setDir(this)">↑</button>
        <button class="dir-btn active" data-deg="0" onclick="setDir(this)">→</button>
        <button class="dir-btn" data-deg="90" onclick="setDir(this)">↓</button>
        <button class="dir-btn" data-deg="180" onclick="setDir(this)">←</button>
      </div>
    </div>

    <!-- 大小 -->
    <div class="control-group">
      <label>大小</label>
      <div class="row">
        <input type="range" id="sizeSlider" min="40" max="300" value="150" oninput="updateSize()">
        <span class="value-display" id="sizeVal">150px</span>
      </div>
    </div>

    <!-- 顏色 -->
    <div class="control-group">
      <label>填充顏色</label>
      <div class="color-presets" id="colorPresets"></div>
      <div class="row" style="margin-top:8px">
        <input type="color" id="fillColor" value="#FF4444" oninput="updateColor()">
        <span class="value-display" id="colorVal">#FF4444</span>
      </div>
    </div>

    <!-- 邊框 -->
    <div class="control-group">
      <label>邊框粗細</label>
      <div class="row">
        <input type="range" id="strokeWidth" min="0" max="8" value="0" step="1" oninput="updateStroke()">
        <span class="value-display" id="strokeVal">0</span>
      </div>
    </div>
    <div class="control-group">
      <label>邊框顏色</label>
      <div class="row">
        <input type="color" id="strokeColor" value="#000000" oninput="updateStroke()">
      </div>
    </div>

    <!-- 透明度 -->
    <div class="control-group">
      <label>透明度</label>
      <div class="row">
        <input type="range" id="opacitySlider" min="20" max="100" value="100" oninput="updateOpacity()">
        <span class="value-display" id="opacityVal">100%</span>
      </div>
    </div>

  </div>
</div>

<script>
  // 箭頭形狀定義 (指向右邊，之後用旋轉控制方向)
  const shapes = {
    solid:    "40,70 130,70 130,40 180,100 130,160 130,130 40,130",
    thin:     "30,82 145,82 145,55 185,100 145,145 145,118 30,118",
    fat:      "30,55 120,55 120,25 185,100 120,175 120,145 30,145",
    chevron:  "60,30 160,100 60,170 90,100",
    curved:   "50,80 80,60 130,60 130,40 180,100 130,160 130,140 80,140 50,120",
    triangle: "40,40 180,100 40,160",
  };

  const presetColors = [
    "#FF4444", "#FF8800", "#FFCC00", "#44CC44",
    "#2299FF", "#8844FF", "#FF44AA", "#333333",
    "#FFFFFF", "#00CED1",
  ];

  let currentStyle = "solid";
  let currentDeg = 0;

  // 初始化顏色選項
  const presetContainer = document.getElementById("colorPresets");
  presetColors.forEach(c => {
    const el = document.createElement("div");
    el.className = "color-swatch" + (c === "#FF4444" ? " active" : "");
    el.style.background = c;
    el.onclick = () => {
      document.getElementById("fillColor").value = c;
      document.querySelectorAll(".color-swatch").forEach(s => s.classList.remove("active"));
      el.classList.add("active");
      updateColor();
    };
    presetContainer.appendChild(el);
  });

  function setStyle(btn) {
    document.querySelectorAll(".style-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentStyle = btn.dataset.style;
    render();
  }

  function setDir(btn) {
    document.querySelectorAll(".dir-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentDeg = parseInt(btn.dataset.deg);
    render();
  }

  function updateSize() {
    const v = document.getElementById("sizeSlider").value;
    document.getElementById("sizeVal").textContent = v + "px";
    render();
  }

  function updateColor() {
    const c = document.getElementById("fillColor").value;
    document.getElementById("colorVal").textContent = c.toUpperCase();
    document.querySelectorAll(".color-swatch").forEach(s => {
      s.classList.toggle("active", s.style.backgroundColor === hexToRgb(c));
    });
    render();
  }

  function updateStroke() {
    document.getElementById("strokeVal").textContent = document.getElementById("strokeWidth").value;
    render();
  }

  function updateOpacity() {
    const v = document.getElementById("opacitySlider").value;
    document.getElementById("opacityVal").textContent = v + "%";
    render();
  }

  function hexToRgb(hex) {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return `rgb(${r}, ${g}, ${b})`;
  }

  function render() {
    const svg = document.getElementById("arrowSvg");
    const shape = document.getElementById("arrowShape");
    const group = document.getElementById("arrowGroup");
    const size = parseInt(document.getElementById("sizeSlider").value);
    const fill = document.getElementById("fillColor").value;
    const sw = document.getElementById("strokeWidth").value;
    const sc = document.getElementById("strokeColor").value;
    const opacity = parseInt(document.getElementById("opacitySlider").value) / 100;

    svg.setAttribute("width", size);
    svg.setAttribute("height", size);
    shape.setAttribute("points", shapes[currentStyle]);
    shape.setAttribute("fill", fill);
    shape.setAttribute("stroke", sw > 0 ? sc : "none");
    shape.setAttribute("stroke-width", sw);
    shape.setAttribute("opacity", opacity);
    group.setAttribute("transform", `rotate(${currentDeg} 100 100)`);
  }

  function getSvgSource() {
    const svg = document.getElementById("arrowSvg");
    const clone = svg.cloneNode(true);
    clone.setAttribute("xmlns", "http://www.w3.org/2000/svg");
    // 固定 viewBox，大小由使用者決定
    clone.setAttribute("viewBox", "0 0 200 200");
    return '<?xml version="1.0" encoding="UTF-8"?>\n' + clone.outerHTML;
  }

  function downloadSVG() {
    const blob = new Blob([getSvgSource()], { type: "image/svg+xml" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "arrow.svg";
    a.click();
  }

  function downloadPNG() {
    const svg = document.getElementById("arrowSvg");
    const size = parseInt(svg.getAttribute("width"));
    const canvas = document.createElement("canvas");
    canvas.width = size * 2;  // 2x 高清
    canvas.height = size * 2;
    const ctx = canvas.getContext("2d");
    const img = new Image();
    const blob = new Blob([getSvgSource()], { type: "image/svg+xml" });
    const url = URL.createObjectURL(blob);
    img.onload = () => {
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      const a = document.createElement("a");
      a.href = canvas.toDataURL("image/png");
      a.download = "arrow.png";
      a.click();
      URL.revokeObjectURL(url);
    };
    img.src = url;
  }

  // 初始繪製
  render();
</script>
</body>
</html>
